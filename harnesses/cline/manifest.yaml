# harnesses/cline/manifest.yaml
name: cline
version: "latest"
install: npm install -g cline

invoke:
  command: cline "$PROMPT" --json --auto-approve true
  model_flag: -m $MODEL_NAME

setup: |
  cline auth openai --apikey "$API_KEY" --baseurl "$MODEL_URL" --modelid "$MODEL_NAME"

metric_source: events.jsonl
metric_format: cline
