# harnesses/kimi/manifest.yaml
name: kimi
version: "latest"
install: curl -fsSL https://code.kimi.com/kimi-code/install.sh | bash

invoke:
  command: kimi -p "$PROMPT" --cwd "$WORKDIR"
  model_flag: ""

setup: |
  mkdir -p ~/.kimi-code
  cat > ~/.kimi-code/config.toml <<KIMIEOF
  default_model = "benchmark-glm"

  [providers.benchmark]
  type = "openai"
  base_url = "$MODEL_URL"
  api_key = "$API_KEY"

  [models.benchmark-glm]
  provider = "benchmark"
  model = "$MODEL_NAME"
  max_context_size = 128000
  KIMIEOF

metric_source: events.jsonl
metric_format: kimi
